<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#07050C" />
    <meta
      data-static-seo
      name="description"
      content="No bank connection needed. Upload your UK bank statement and get instant AI spending insights, smart budgets, and credit tracking — free on iOS & Android."
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link data-static-seo rel="canonical" href="https://expenzez.com/" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500;1,9..144,600&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph (static fallback for no-JS / social crawlers; React replaces per-page) -->
    <meta data-static-seo property="og:type" content="website" />
    <meta data-static-seo property="og:site_name" content="Expenzez" />
    <meta data-static-seo property="og:title" content="Expenzez — AI money insights, no bank login required" />
    <meta data-static-seo property="og:description" content="Upload your UK bank statement (PDF or CSV) and get instant AI spending insights, smart budgets, and credit tracking. Private by design — free on iOS & Android." />
    <meta data-static-seo property="og:url" content="https://expenzez.com/" />
    <meta data-static-seo property="og:image" content="https://expenzez.com/og-preview.png" />
    <meta data-static-seo property="og:image:width" content="1200" />
    <meta data-static-seo property="og:image:height" content="630" />
    <meta data-static-seo property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta data-static-seo name="twitter:card" content="summary_large_image" />
    <meta data-static-seo name="twitter:title" content="Expenzez — AI money insights, no bank login required" />
    <meta data-static-seo name="twitter:description" content="Upload your UK bank statement (PDF or CSV) and get instant AI spending insights, smart budgets, and credit tracking. Private by design — free on iOS & Android." />
    <meta data-static-seo name="twitter:image" content="https://expenzez.com/og-preview.png" />

    <title data-static-seo>Expenzez — AI money insights, no bank login required</title>

    <!-- Pages are prerendered, so they work without JS. Keep scroll-reveal and
         entrance elements visible when JS (and thus the reveal observer) is off. -->
    <noscript>
      <style>
        .reveal { opacity: 1 !important; translate: none !important; }
        .hero-fade { opacity: 1 !important; animation: none !important; }
      </style>
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
