# Netlify configuration for expenzez-website

[build]
  # Install the headless Chrome the prerender step needs (scripts/prerender.mjs),
  # into Netlify's persistent cache so it downloads once and is reused.
  command = "npx puppeteer browsers install chrome && npm run build"
  publish = "build"

[build.environment]
  PUPPETEER_CACHE_DIR = "/opt/build/cache/puppeteer"

# Redirect all routes to index.html for React SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers — applied to every response. CSP is intentionally strict;
# CRA/Netlify don't inject inline scripts, but we allow 'unsafe-inline' on
# styles because styled-components / inline fonts rely on it.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' mailto:; object-src 'none'; upgrade-insecure-requests"
